name: Portfolio Cockpit — Phase 3 Post-Market

on:
  schedule:
    - cron: '5 10 * * 1-5'   # 15:35 IST (Mon–Fri)
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  phase3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance requests anthropic pytz
      - name: Run Phase 3 Post-Market Stop-Loss Audit
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/cockpit_runner.py --phase 3
