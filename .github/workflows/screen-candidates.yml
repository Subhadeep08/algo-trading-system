name: PMS Candidate Screener

on:
  schedule:
    - cron: '40 10 * * 1-5'   # 16:10 IST (Mon–Fri) — post-market close
  workflow_dispatch:
    inputs:
      tickers:
        description: >
          Comma-separated NSE tickers for one-off screening (e.g. DIXON,ASTRAL,POLYCAB).
          Leave blank to screen the full watchlist.md.
        required: false
        default: ''
      portfolio_value:
        description: >
          Portfolio value in INR for position sizing (e.g. 425000).
          Overrides PORTFOLIO_VALUE_INR secret if set.
        required: false
        default: ''

jobs:
  screen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run PMS Candidate Screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PORTFOLIO_VALUE_INR: ${{ inputs.portfolio_value || secrets.PORTFOLIO_VALUE_INR || '0' }}
        run: |
          TICKERS="${{ inputs.tickers }}"
          if [ -n "$TICKERS" ]; then
            python scripts/run_screener.py --tickers "$TICKERS"
          else
            python scripts/run_screener.py
          fi
      - name: Commit screening results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/skills/portfolio-cockpit/references/screening-results.md
          git diff --staged --quiet || git commit -m "chore: update PMS screening results $(date '+%Y-%m-%d') [skip ci]"
          git push origin HEAD
